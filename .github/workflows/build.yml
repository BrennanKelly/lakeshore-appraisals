name: Build static site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Clean previous root build files
        run: |
          rm -rf assets
          rm -f index.html favicon.svg robots.txt logo-lighthouse.svg .htaccess

      - name: Copy built files to root
        run: cp -r client/dist/. .

      - name: Remove Manus artifacts
        run: rm -rf __manus__ .gitkeep || true

      - name: Commit built files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html assets favicon.svg robots.txt logo-lighthouse.svg .htaccess
          if ! git diff --staged --quiet; then
            git commit -m "Deploy built site [skip ci]"
            git push
          fi
