name: Build and Commit Static Files

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Remove dev artifacts from build
        run: rm -rf client/dist/__manus__ client/dist/.gitkeep

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/dist/ -f
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update built static files [skip ci]"
            git push
          fi
