name: Build static site

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm build

      - name: Copy build output to root
        run: |
          rm -rf assets
          rm -f index.html favicon.svg logo-lighthouse.svg robots.txt
          cp -r client/dist/. .

      - name: Commit built files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html assets favicon.svg logo-lighthouse.svg robots.txt
          if ! git diff --staged --quiet; then
            git commit -m "deploy static build [skip ci]"
            git push
          fi