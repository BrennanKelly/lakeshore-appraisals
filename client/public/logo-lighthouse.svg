<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Lake Michigan blue sky/circle background -->
  <circle cx="100" cy="100" r="96" fill="#4A90D9"/>
  <circle cx="100" cy="100" r="96" fill="url(#skyGrad)"/>

  <defs>
    <linearGradient id="skyGrad" x1="100" y1="0" x2="100" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5BA3E6"/>
      <stop offset="100%" stop-color="#3A7BC8"/>
    </linearGradient>
    <linearGradient id="towerGrad" x1="85" y1="60" x2="115" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EDF2"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="155" x2="200" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3670A8"/>
      <stop offset="50%" stop-color="#2E6091"/>
      <stop offset="100%" stop-color="#3670A8"/>
    </linearGradient>
    <!-- Light beam glow -->
    <radialGradient id="beamGlow" cx="100" cy="52" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4D6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFF4D6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Water/lake at bottom -->
  <ellipse cx="100" cy="168" rx="96" ry="32" fill="url(#waterGrad)" opacity="0.7"/>
  <!-- Water shimmer lines -->
  <line x1="30" y1="162" x2="62" y2="162" stroke="white" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="75" y1="170" x2="100" y2="170" stroke="white" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="120" y1="165" x2="155" y2="165" stroke="white" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  <line x1="50" y1="175" x2="78" y2="175" stroke="white" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>
  <line x1="130" y1="172" x2="160" y2="172" stroke="white" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>

  <!-- Rocky base / platform -->
  <path d="M62 152 L138 152 L142 158 L58 158 Z" fill="#8B9DAF" opacity="0.6"/>
  <rect x="65" y="148" width="70" height="5" rx="1" fill="#CFD8E0"/>

  <!-- Lighthouse tower - main white body tapering upward -->
  <path d="M82 148 L88 68 L112 68 L118 148 Z" fill="url(#towerGrad)"/>

  <!-- Red horizontal stripe bands -->
  <path d="M84.8 118 L115.2 118 L115.8 112 L84.2 112 Z" fill="#C0392B"/>
  <path d="M86.5 98 L113.5 98 L114 92 L86 92 Z" fill="#C0392B"/>

  <!-- Lighthouse gallery/observation deck -->
  <rect x="83" y="64" width="34" height="5" rx="1.5" fill="#2C3E50"/>
  <!-- Gallery railing -->
  <rect x="80" y="60" width="40" height="5" rx="1.5" fill="#4A4A5A"/>
  <rect x="78" y="58" width="44" height="3" rx="1" fill="#2C3E50"/>

  <!-- Lantern room -->
  <rect x="86" y="42" width="28" height="17" rx="2" fill="white" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Lantern room window panes -->
  <line x1="93" y1="43" x2="93" y2="58" stroke="#2C3E50" stroke-width="0.8"/>
  <line x1="100" y1="43" x2="100" y2="58" stroke="#2C3E50" stroke-width="0.8"/>
  <line x1="107" y1="43" x2="107" y2="58" stroke="#2C3E50" stroke-width="0.8"/>
  <!-- Warm glow inside lantern -->
  <rect x="87.5" y="43.5" width="25" height="14" rx="1" fill="#FDE68A" opacity="0.5"/>

  <!-- Light beam glow -->
  <circle cx="100" cy="50" r="24" fill="url(#beamGlow)"/>

  <!-- Red roof / dome -->
  <path d="M86 42 Q87 35 100 30 Q113 35 114 42 Z" fill="#C0392B"/>
  <!-- Roof highlight -->
  <path d="M92 40 Q94 36 100 33 Q102 34.5 104 36" stroke="white" stroke-width="0.7" fill="none" opacity="0.35"/>

  <!-- Lightning rod / finial -->
  <line x1="100" y1="30" x2="100" y2="22" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <circle cx="100" cy="20" r="2.5" fill="#C0392B"/>

  <!-- Tower window details -->
  <rect x="95" y="75" width="10" height="8" rx="5" fill="#4A90D9" opacity="0.5" stroke="#B0BEC5" stroke-width="0.8"/>
  <rect x="94" y="105" width="12" height="4" rx="2" fill="#4A90D9" opacity="0.4" stroke="#B0BEC5" stroke-width="0.6"/>
  <rect x="93" y="130" width="14" height="10" rx="2" fill="#4A90D9" opacity="0.4" stroke="#B0BEC5" stroke-width="0.8"/>
  <!-- Door at base -->
  <rect x="93" y="138" width="14" height="10" rx="2" fill="#2C3E50" opacity="0.7"/>
  <circle cx="105" cy="143" r="1" fill="#E0E0E0"/>
</svg>
