  <rect x="27" y="13" width="10" height="8" rx="1.5" fill="white" stroke="#2C3E50" stroke-width="1"/>
  <rect x="28" y="14" width="8" height="6" rx="0.5" fill="#FDE68A" opacity="0.5"/>
  <!-- Red dome roof -->
  <path d="M27 13 Q28 9 32 7 Q36 9 37 13 Z" fill="#C0392B"/>
