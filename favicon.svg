  <path d="M0 48 Q16 44 32 48 Q48 52 64 48 L64 64 L0 64 Z" fill="#3670A8" opacity="0.5"/>
  <!-- Lighthouse tower -->
  <path d="M26 48 L28 22 L36 22 L38 48 Z" fill="white"/>
